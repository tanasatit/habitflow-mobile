services:
  postgres:
    image: postgres:16-alpine
    container_name: habitflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: habitflow
      POSTGRES_PASSWORD: habitflow
      POSTGRES_DB: habitflow
    ports:
      - "5433:5432"
    volumes:
      - habitflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitflow -d habitflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  habitflow_pgdata:
