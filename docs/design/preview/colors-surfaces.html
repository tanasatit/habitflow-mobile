<!doctype html><html><head><meta charset="utf-8"><title>Surfaces & text</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:10px;align-items:stretch">
  <div style="flex:1;background:#FFF9F5;border:1px solid #E0DAD6;border-radius:16px;padding:12px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">background</div>
    <span class="mono">#FFF9F5 — warm cream</span>
  </div>
  <div style="flex:1;background:#FFFFFF;border:1px solid #E0DAD6;border-radius:16px;padding:12px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">surface</div>
    <span class="mono">#FFFFFF — cards</span>
  </div>
  <div style="flex:1;background:#F4F1EF;border:1px solid #E0DAD6;border-radius:16px;padding:12px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">surface-variant</div>
    <span class="mono">#F4F1EF — gutters</span>
  </div>
  <div style="flex:1;background:#fff;border:1px solid #E0DAD6;border-radius:16px;padding:12px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px;color:#302E2C">on-background</div>
    <div><span class="mono">#302E2C</span></div>
    <div style="font-size:11px;color:#5E5B58">on-surface-variant · #5E5B58</div>
  </div>
</div>
</body></html>
