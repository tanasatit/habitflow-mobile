<!doctype html><html><head><meta charset="utf-8"><title>Shadow / elevation</title><link rel="stylesheet" href="_card.css"></head>
<body style="background:#FFF9F5">
<div class="row" style="gap:18px;align-items:stretch">
  <div style="flex:1;background:#fff;border:1px solid #E0DAD6;border-radius:20px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">at rest</div>
    <span class="mono">border only · no shadow</span>
  </div>
  <div style="flex:1;background:#fff;border:1px solid #E0DAD6;border-radius:20px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 1px 2px rgba(48,46,44,.04)">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">shadow-sm</div>
    <span class="mono">0 1 2 / .04</span>
  </div>
  <div style="flex:1;background:#fff;border:1px solid #E0DAD6;border-radius:20px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 4px 12px rgba(48,46,44,.06)">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">shadow-md (hover)</div>
    <span class="mono">0 4 12 / .06</span>
  </div>
  <div style="flex:1;background:#FF8243;color:#fff;border-radius:20px;padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 8px 24px rgba(255,130,67,.28)">
    <div style="font-family:var(--font-headline);font-weight:700;font-size:13px">shadow-pop</div>
    <span class="mono" style="color:#fff;opacity:.85">primary-tinted · FAB</span>
  </div>
</div>
</body></html>
