<!doctype html><html><head><meta charset="utf-8"><title>Input field</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="stack" style="gap:10px">
  <div>
    <label style="display:block;font-size:12px;font-weight:600;color:#302E2C;margin-bottom:6px">Email</label>
    <input value="tai@habitflow.app" style="width:100%;background:#fff;border:1px solid #E0DAD6;border-radius:12px;padding:11px 14px;font-family:var(--font-sans);font-size:14px;color:#302E2C;outline:none">
  </div>
  <div style="background:#fff;border:1px solid #E0DAD6;border-radius:18px;display:flex;align-items:center;gap:8px;padding:8px 12px">
    <input placeholder="Describe your week or ask for a habit plan…" style="flex:1;border:0;outline:none;background:transparent;font-family:var(--font-sans);font-size:14px;padding:6px 4px;color:#302E2C">
    <button style="background:#FF8243;color:#fff;border:0;border-radius:12px;padding:9px 18px;font-family:var(--font-headline);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer">Send</button>
  </div>
</div>
</body></html>
