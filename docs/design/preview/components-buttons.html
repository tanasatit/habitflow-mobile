<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="stack" style="gap:14px">
  <div class="row" style="gap:12px;align-items:center">
    <button style="background:#FF8243;color:#fff;border:0;border-radius:9999px;padding:10px 20px;font-family:var(--font-sans);font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;cursor:pointer"><span class="icon" style="font-size:16px">add</span>Add Ritual</button>
    <button style="background:#FF8243;color:#fff;border:0;border-radius:12px;padding:10px 20px;font-family:var(--font-headline);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer">Send</button>
    <button style="background:#F4F1EF;color:#5E5B58;border:0;border-radius:9999px;padding:8px 16px;font-family:var(--font-sans);font-weight:500;font-size:12px;cursor:pointer">Cancel</button>
    <button style="background:#fff;color:#302E2C;border:1px solid #E0DAD6;border-radius:9999px;padding:8px 18px;font-family:var(--font-sans);font-weight:700;font-size:13px;cursor:pointer">Plan my week</button>
    <a href="#" style="color:#069494;text-decoration:none;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:4px">Chat with AI Coach<span class="icon" style="font-size:14px">arrow_forward</span></a>
  </div>
  <div class="row" style="gap:8px">
    <span class="mono">primary pill · send-style square · neutral pill · suggestion chip · text link</span>
  </div>
</div>
</body></html>
