<!doctype html><html><head><meta charset="utf-8"><title>Habit row</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="stack" style="gap:10px">
  <div style="display:flex;align-items:center;gap:14px;padding:14px;background:#fff;border:1px solid #E0DAD6;border-radius:20px">
    <div style="width:38px;height:38px;border-radius:12px;background:#FFEDD5;color:#C2410C;display:flex;align-items:center;justify-content:center"><span class="icon icon-fill" style="font-size:18px">fitness_center</span></div>
    <div style="flex:1"><div style="font-family:var(--font-sans);font-weight:600;font-size:14px">Morning workout</div><div style="font-size:11px;color:#5E5B58;text-transform:capitalize;margin-top:2px">fitness</div></div>
    <div style="display:flex;align-items:center;gap:4px"><span class="icon icon-fill" style="color:#FF8243;font-size:14px">local_fire_department</span><span style="color:#FF8243;font-weight:700;font-size:12px">7</span></div>
    <div style="width:26px;height:26px;border-radius:9999px;border:2px solid #E0DAD6"></div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;padding:14px;background:#fff;border:1px solid #E0DAD6;border-radius:20px;opacity:.6">
    <div style="width:38px;height:38px;border-radius:12px;background:#F3E8FF;color:#7E22CE;display:flex;align-items:center;justify-content:center"><span class="icon icon-fill" style="font-size:18px">self_improvement</span></div>
    <div style="flex:1"><div style="font-family:var(--font-sans);font-weight:600;font-size:14px;text-decoration:line-through;color:#5E5B58">Meditate 10 min</div><div style="font-size:11px;color:#5E5B58;margin-top:2px">mindfulness</div></div>
    <div style="display:flex;align-items:center;gap:4px"><span class="icon icon-fill" style="color:#FF8243;font-size:14px">local_fire_department</span><span style="color:#FF8243;font-weight:700;font-size:12px">12</span></div>
    <div style="width:26px;height:26px;border-radius:9999px;background:#069494;display:flex;align-items:center;justify-content:center"><span class="icon icon-fill" style="color:#fff;font-size:14px">check</span></div>
  </div>
</div>
</body></html>
