<!doctype html><html><head><meta charset="utf-8"><title>Calendar event cards</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:10px;align-items:stretch">
  <div style="flex:1;background:#FF8243;color:#fff;border-radius:14px;padding:8px 10px;min-height:64px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font-weight:600;font-size:12px;line-height:1.2">Morning workout</div>
    <div style="opacity:.85;font-size:10px">7:00 · 30min</div>
  </div>
  <div style="flex:1;background:#069494;color:#fff;border-radius:14px;padding:8px 10px;min-height:64px;display:flex;flex-direction:column;justify-content:space-between;position:relative">
    <span style="position:absolute;top:6px;right:6px;background:rgba(255,255,255,.2);font-size:9px;padding:1px 6px;border-radius:9999px;font-weight:600">AI</span>
    <div style="font-weight:600;font-size:12px;line-height:1.2;padding-right:24px">Run with Tai</div>
    <div style="opacity:.85;font-size:10px">17:30 · 45min</div>
  </div>
  <div style="flex:1;background:#FFC0CB;color:#302E2C;border-radius:14px;padding:8px 10px;min-height:64px;display:flex;flex-direction:column;justify-content:space-between;position:relative">
    <span style="position:absolute;top:6px;right:6px;background:rgba(48,46,44,.1);font-size:9px;padding:1px 6px;border-radius:9999px;font-weight:600">G</span>
    <div style="font-weight:600;font-size:12px;line-height:1.2;padding-right:24px">Team standup</div>
    <div style="opacity:.7;font-size:10px">9:00 · 15min</div>
  </div>
</div>
<div class="row" style="gap:8px;margin-top:10px"><span class="mono">primary · tertiary (AI) · secondary (Google) — small badge top-right</span></div>
</body></html>
