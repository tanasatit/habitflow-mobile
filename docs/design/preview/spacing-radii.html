<!doctype html><html><head><meta charset="utf-8"><title>Spacing & radii</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:24px;align-items:flex-start">
  <div class="stack" style="gap:8px;flex:1">
    <div class="label">Radii</div>
    <div class="row" style="gap:10px">
      <div style="width:48px;height:48px;background:#FF8243;border-radius:8px"></div>
      <div style="width:48px;height:48px;background:#FF8243;border-radius:12px"></div>
      <div style="width:48px;height:48px;background:#FF8243;border-radius:16px"></div>
      <div style="width:48px;height:48px;background:#FF8243;border-radius:20px"></div>
      <div style="width:48px;height:48px;background:#FF8243;border-radius:24px"></div>
      <div style="width:48px;height:48px;background:#FF8243;border-radius:9999px"></div>
    </div>
    <div class="row" style="gap:10px;font-size:10px;color:#5E5B58">
      <span style="width:48px;text-align:center">8 sm</span>
      <span style="width:48px;text-align:center">12 md</span>
      <span style="width:48px;text-align:center">16 lg</span>
      <span style="width:48px;text-align:center">20 xl</span>
      <span style="width:48px;text-align:center;font-weight:700;color:#302E2C">24 2xl</span>
      <span style="width:48px;text-align:center">full</span>
    </div>
  </div>
  <div class="stack" style="gap:8px;flex:1">
    <div class="label">Spacing (4px grid)</div>
    <div class="row" style="gap:6px;align-items:flex-end">
      <div style="width:4px;height:18px;background:#FF8243;border-radius:2px"></div>
      <div style="width:8px;height:24px;background:#FF8243;border-radius:2px"></div>
      <div style="width:12px;height:30px;background:#FF8243;border-radius:2px"></div>
      <div style="width:16px;height:36px;background:#FF8243;border-radius:2px"></div>
      <div style="width:24px;height:48px;background:#FF8243;border-radius:2px"></div>
      <div style="width:32px;height:60px;background:#FF8243;border-radius:2px"></div>
      <div style="width:40px;height:72px;background:#FF8243;border-radius:2px"></div>
    </div>
    <div class="row" style="gap:6px;font-size:10px;color:#5E5B58">
      <span style="width:4px;text-align:center">1</span>
      <span style="width:8px;text-align:center">2</span>
      <span style="width:12px;text-align:center">3</span>
      <span style="width:16px;text-align:center">4</span>
      <span style="width:24px;text-align:center">6</span>
      <span style="width:32px;text-align:center">8</span>
      <span style="width:40px;text-align:center">10</span>
    </div>
  </div>
</div>
</body></html>
