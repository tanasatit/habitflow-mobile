<!doctype html><html><head><meta charset="utf-8"><title>Numeric display</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:24px;align-items:center">
  <div style="text-align:center">
    <div style="font-family:var(--font-headline);font-weight:800;font-size:64px;line-height:1;color:#FF8243;font-variant-numeric:tabular-nums;letter-spacing:-0.02em">12</div>
    <div style="font-size:12px;color:#5E5B58;font-weight:500;margin-top:4px">day streak</div>
  </div>
  <div style="text-align:center">
    <div style="font-family:var(--font-headline);font-weight:800;font-size:42px;line-height:1;color:#302E2C;font-variant-numeric:tabular-nums">3/5</div>
    <div style="font-size:11px;color:#5E5B58;font-weight:500;margin-top:4px">DAILY HABITS</div>
  </div>
  <div style="text-align:center">
    <div style="font-family:var(--font-headline);font-weight:800;font-size:42px;line-height:1;color:#069494;font-variant-numeric:tabular-nums">86%</div>
    <div style="font-size:11px;color:#5E5B58;font-weight:500;margin-top:4px">WEEKLY GOAL</div>
  </div>
  <div style="flex:1;border-left:1px solid #E0DAD6;padding-left:24px">
    <span class="mono">font-variant-numeric: tabular-nums</span><br>
    <span class="mono">800 weight · −2% letter-spacing</span><br>
    <span class="mono">streak → primary, completion → tertiary</span>
  </div>
</div>
</body></html>
