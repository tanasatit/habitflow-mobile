<!doctype html><html><head><meta charset="utf-8"><title>Brand palette</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="stack" style="gap:14px">

      <div style="font-family:var(--font-headline);font-weight:800;font-size:15px">Primary</div>
      <div style="display:flex;justify-content:space-between;align-items:end"><span class="mono" style="color:#fff;opacity:.85">#FF8243</span><span style="font-size:10px;opacity:.85">CTAs · streak · active</span></div>
    </div>
    <div style="flex:1;background:#FFC0CB;color:#302E2C;border-radius:18px;padding:14px 16px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="font-family:var(--font-headline);font-weight:800;font-size:15px">Secondary</div>
      <div style="display:flex;justify-content:space-between;align-items:end"><span class="mono">#FFC0CB</span><span style="font-size:10px">soft accents</span></div>
    </div>
    <div style="flex:1;background:#069494;color:#fff;border-radius:18px;padding:14px 16px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="font-family:var(--font-headline);font-weight:800;font-size:15px">Tertiary</div>
      <div style="display:flex;justify-content:space-between;align-items:end"><span class="mono" style="color:#fff;opacity:.85">#069494</span><span style="font-size:10px;opacity:.85">complete · AI</span></div>
    </div>
    <div style="flex:1;background:#FCE883;color:#302E2C;border-radius:18px;padding:14px 16px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="font-family:var(--font-headline);font-weight:800;font-size:15px">Accent</div>
      <div style="display:flex;justify-content:space-between;align-items:end"><span class="mono">#FCE883</span><span style="font-size:10px">AI insight</span></div>
    </div>
  </div>
</div>
</body></html>
