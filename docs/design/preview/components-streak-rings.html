<!doctype html><html><head><meta charset="utf-8"><title>Streak & progress rings</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row" style="gap:14px;align-items:stretch">
  <div style="flex:0 0 200px;background:#fff;border:1px solid #E0DAD6;border-radius:24px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
    <span class="icon icon-fill" style="color:#FF8243;font-size:42px">local_fire_department</span>
    <div style="font-family:var(--font-headline);font-weight:800;font-size:54px;line-height:1;color:#FF8243;font-variant-numeric:tabular-nums">12</div>
    <div style="font-size:12px;color:#5E5B58;font-weight:500">day streak</div>
  </div>
  <div style="flex:1;background:#fff;border:1px solid #E0DAD6;border-radius:24px;padding:18px">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Progress Overview</div>
    <div class="row" style="gap:32px;justify-content:space-around">
      <div style="text-align:center">
        <svg width="92" height="92" viewBox="0 0 92 92"><circle cx="46" cy="46" r="38" stroke="#e0dad6" stroke-width="8" fill="none"/><circle cx="46" cy="46" r="38" stroke="#069494" stroke-width="8" stroke-linecap="round" fill="none" stroke-dasharray="238.76" stroke-dashoffset="71.6" transform="rotate(-90 46 46)"/></svg>
        <div style="margin-top:-58px;font-family:var(--font-headline);font-weight:700;font-size:16px">3/5</div>
        <div style="margin-top:38px;font-size:11px;color:#5E5B58;font-weight:500">Daily Habits</div>
      </div>
      <div style="text-align:center">
        <svg width="92" height="92" viewBox="0 0 92 92"><circle cx="46" cy="46" r="38" stroke="#e0dad6" stroke-width="8" fill="none"/><circle cx="46" cy="46" r="38" stroke="#FF8243" stroke-width="8" stroke-linecap="round" fill="none" stroke-dasharray="238.76" stroke-dashoffset="33.4" transform="rotate(-90 46 46)"/></svg>
        <div style="margin-top:-58px;font-family:var(--font-headline);font-weight:700;font-size:16px">86%</div>
        <div style="margin-top:38px;font-size:11px;color:#5E5B58;font-weight:500">Weekly Goal</div>
      </div>
    </div>
  </div>
</div>
</body></html>
