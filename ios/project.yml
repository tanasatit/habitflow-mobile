name: HabitFlow
options:
  bundleIdPrefix: com.tanasatit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  swift: "6.0"
settings:
  base:
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
targets:
  HabitFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HabitFlow
    settings:
      base:
        INFOPLIST_FILE: HabitFlow/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tanasatit.HabitFlow
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
